name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: fullstack-blog-project

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Resolve image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}

  deploy:
    needs: test-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE: ghcr.io/${{ needs.test-build-push.outputs.image-name }}:${{ github.sha }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
      APP_HOST_PORT: ${{ secrets.APP_HOST_PORT }}
      MONGODB_URL: ${{ secrets.MONGODB_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Check deployment secrets
        id: deploy-check
        run: |
          missing=0
          for secret_name in SSH_HOST SSH_USER SSH_PRIVATE_KEY MONGODB_URL SESSION_SECRET CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET GHCR_TOKEN; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing $secret_name; skipping deploy."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH key
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Write runtime environment file
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          umask 077
          cat > app.env <<EOF
          NODE_ENV=production
          PORT=3000
          MONGODB_URL=$MONGODB_URL
          SESSION_SECRET=$SESSION_SECRET
          CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
          CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
          CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
          EOF

      - name: Copy runtime environment to server
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          remote_dir="${DEPLOY_DIR:-fullstack-blog-project}"
          ssh -i ~/.ssh/authorized_keys "$SSH_USER@$SSH_HOST" "mkdir -p '$remote_dir'"
          scp -i ~/.ssh/authorized_keys app.env "$SSH_USER@$SSH_HOST:$remote_dir/.env"

      - name: Pull and restart container
        if: steps.deploy-check.outputs.enabled == 'true'
        run: |
          remote_dir="${DEPLOY_DIR:-fullstack-blog-project}"
          host_port="${APP_HOST_PORT:-3000}"
          ghcr_username="${GHCR_USERNAME:-$GITHUB_REPOSITORY_OWNER}"

          ssh -i ~/.ssh/authorized_keys "$SSH_USER@$SSH_HOST" \
            "IMAGE='$IMAGE' CONTAINER_NAME='$CONTAINER_NAME' APP_HOST_PORT='$host_port' DEPLOY_DIR='$remote_dir' GHCR_USERNAME='$ghcr_username' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'EOF'
          set -euo pipefail

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker pull "$IMAGE"
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --env-file "$DEPLOY_DIR/.env" \
            -p "$APP_HOST_PORT:3000" \
            "$IMAGE"
          docker image prune -f
          EOF
